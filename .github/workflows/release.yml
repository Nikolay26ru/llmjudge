name: Publish to PyPI

# Publishes to PyPI when a GitHub Release is published, using PyPI Trusted
# Publishing (OIDC) — no API token is stored in the repo. Configure the trusted
# publisher once on PyPI: project `llm-judge-kit` -> Publishing -> add a
# GitHub publisher with owner `Nikolay26ru`, repository `llm-judge-kit`,
# workflow `release.yml` (environment left blank).
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write # mint the OIDC token PyPI Trusted Publishing verifies
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Build sdist + wheel
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true # never error if the version is already on PyPI
